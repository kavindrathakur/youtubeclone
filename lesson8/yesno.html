<!DOCTYPE html>
<html>
  <head>
   <style>
    p{
      font-size: 18px;
      font-family: Arial, sans-serif;
      color: #333;
      display: inline-block;
      margin-right: 20px;
    }
     .yes-button {
       background-color: #1d551f;
       color: white;
       padding: 10px 20px;
       border: none;
       border-radius: 5px;
       cursor: pointer;
       margin-right: 6px;
     }
     .no-button {
       background-color: #a71d1d;
       color: white;
       padding: 10px 20px;
       border: none;
       border-radius: 5px;
       cursor: pointer;
     }
     .yes-button:hover {
       background-color: #144016;
     }
     .no-button:hover {
       background-color: #6e0b0b;
     }
    </style>
  </head>
  <body>
    <p>
      Do you like HTML?
    </p>
    <button class="yes-button">
      yes
    </button>
    <button class="no-button">
      no
    </button>
  </body>
</html>
