<!DOCTYPE html>

<html>
  <head>
    <style>
      input {
        padding: 10px;
        margin: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
        color: #d6e895;

      }
      .first-name {
        width: 200px;
      }
      .last-name {
        width: 200px;
      }
      .email {
        display: block;
        width: 400px;
      }
      button {
        background-color: #1d551f;
        color: white;
        padding: 10px 80px 10px 80px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        align-items: center;
        margin: 20px 20px 20px 80px;
      }
    </style>

  </head>
  <body>
    <input type="text" placeholder="first name" class="first-name">
    <input type="text" placeholder="last name" class="last-name">
    <input type="email" placeholder="email" class="email">
    <button>Sign Up</button>
    
  </body>     
</html>
