<!DOCTYPE html>

<html>
  <head>
    <style>
      div{
        width: 200px;
        height: fit-content;
        
        display: inline-block;
      
          
          border: none;
          box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
      }
      .cat{
        width: 200px;
        height: 170px;
        
      }
      p{
        font-family: 'Roboto', sans-serif;
        font-size: 18px;
        font-weight: 500;
        margin-left: 8px;
        margin-bottom: 5px;
      }
      .friends{
        font-family: 'Roboto', sans-serif;
        font-size: 14px;
        font-weight: 400;
        margin-left: 5px;
        margin-top: 0px;
        color: gray;
        display: inline-block;
        margin-bottom: 15px;
        align-items: center;
        
      }
      button{
        font-family: 'Roboto', sans-serif;
        background-color: rgb(61, 120, 171);
        color: white;
        border: none;
        height: 40px;
        font-size: 16px;
        font-weight: 400;
        margin-left: 8px;
        margin-bottom: 5px;
        padding: 5px 10px;
        display: inline-block;
        border-radius: 10px;
        width: 120px;
        margin-top: 0px;
      }
      .mutual-profile{
        width: 20px;
        background: none;
        border-radius: 50%;
        display: inline-block;
        margin-left: 8px;
      }
      .might-know{
        display: inline-block;
        border: none;
      }
      .mutual{
        width: 18px;
        align-self: center;
        margin-left: 3px;
        
      }
    </style>
  </head>
  <body>

    <div>

      <div>

        <img src="cat.jpg" class="cat">

      </div>

      <div>
        
        <p>

        <strong>Oliver </strong>
    
      </p>

       <div class="mutual-profile">
          <img src="cat_PNG50514.png" class="mutual">
        </div>

       

        <p class="friends">
       

        2 mutual friends

      </p>

       

      <button>

        Add friend

      </button>

    </div>
     
      
      
    </div>
    
  </body>     
</html>
