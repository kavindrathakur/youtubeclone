<!DOCTYPE html>

<html>
  <head>
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <style>
      div{
        font-family: 'Roboto', Arial;
      }
      .container{
       border: 1px;
        display: flex;
        border-style: solid;
        width: 450px;
      }
      .image-container{
        
       margin-top: 2px;
        height: 50px;
        border-radius: 50%;
        margin-right: 16px;
        margin-left: 16px;
      }
      .tweet{
        flex: 1;
       
      }
      .header{
        
        display: flex;
        margin-bottom: 5px;
        margin-top: 10px;
      }
      .name{
        margin-left: 3px;
        margin-right: 6px;
        font-size: 16px;
        font-weight: 700;
      }
      .handle{
        color: rgb(85, 83, 83);
      }
      .tweetabout{
        
      }
      .youtube{
        
        display: flex;
        width: 350px;
        margin-top: 12px;
        margin-bottom: 20px;
        border-radius: 20px;
        border: 1px;
        border-style: solid;
        border-color:rgb(85, 83, 83) ;
        overflow: hidden;
        

      }
      .thumnail{
        background-color: grey;
        width: 70px;
        border-radius: 2px;
        
      }
      .youtubedetail{
        flex: 1;
        
        margin-left: 8px;
        margin-top: 10px;
      }
      .comyoutube{
        
         color: rgb(85, 83, 83);
      }
      .title{
     margin-bottom: 15px;
        margin-top: 8px;
      }
      .profile{
        border-radius: 50%;
        margin-top: 2px;
        width: 50px;
        height: 50px;
      }
      .youtubethumnail{
        width: 70px;
        height: 72px;
        border-radius: 1px;
        

      }
    </style>
  </head>
  <body>
    <div  class="container">
      <div class="image-container">
        <img src="/profile/channel-1.jpeg" class="profile">
      </div>
      <div class="tweet">
        <div class="header">
          <div class="name"> Kavindra </div>
          <div class="handle"> @Kavindra67 </div>
        </div>
        <div class="tweetabout"> How is HTML&CSS is important even today!!</div>
        <div class="youtube">
          <div class="thumnail"> <img src="/thumbnails/thumbnail-1.webp" class="youtubethumnail"> </div>
          <div class=" youtubedetail">
            <div class="comyoutube"> youtube.com</div>
            <div class="title"> Is learning HTML&CSS still worth it? </div>
          </div>
        </div>
      </div>
    </div>
    

    
  </body>     
</html>
