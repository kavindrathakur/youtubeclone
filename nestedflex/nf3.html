<!DOCTYPE html>

<html>
  <head>
    <style>
      .container{
       
         padding-top: 10px;
          padding-bottom: 10px;
          padding-left: 15px;
          padding-right: 15px;
          width: 400px;
          box-shadow: 0 0 5px rgba(0, 0, 0, 0.25);
          border-radius: 4px;
          margin-top: 20px;
          margin-left: 20px;
      }
      .inboxlabel{
       
        margin-bottom: 18px;
      }
      .email{
        align-items: center;
        margin-top: 25px;
       
        display: flex;
      }
      .header{
        display: flex;
  flex-direction: row;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 3px;
      }
      .topic{
        font-weight: 500;
        font-size: 16px;
        margin-bottom: 5px;
      }
      .message{
        font-size: 12px;
        color: rgb(127, 125, 125);
      }
      .profile-pic-container{
        width: 50px;
        display: flex;
        margin-right: 8px;
        align-items: top;
      }
      .profile-pic{
        width: 100%;
        height: 50px;
        border-radius: 50%;
      }
      .email-content{
        flex: 1;
        
       
      }
      .header{
        display: flex;
        justify-content: space-between;
      }
      .time{margin-left: 50px;
      }
      .name{
        font-size: 20px;
        font-weight: 700;
      }
      
    </style>
  </head>
  <body>
    <div class="container">
      <div class="inboxlabel">
        ALL INBOXES
      </div>
      <div class="email">
        <div class="profile-pic-container">
          <img src="/profile/channel-1.jpeg" class="profile-pic">
        </div>
        <div class="email-content">
          <div class="header">
            <div class="name"> KAVINDRA</div>
            <div class="time"> 4:58 PM</div>
          </div>
          <div class="topic"> Biggest sales of the year!</div>
          <div class="message">  Hey there! We're writing to tell you about our...</div>
        </div>
      </div>

      <div class="email">
        <div class="profile-pic-container">
          <img src="/profile/channel-2.jpeg" class="profile-pic">
        </div>
        <div class="email-content">
          <div class="header">
            <div class="name"> Chewy Promotions</div>
            <div class="time"> 12:20 AM</div>
          </div>
          <div class="topic"> Best BUYYY!!!</div>
          <div class="message"> Time to order the WISHHHHLISTTTTTT!!!!  </div>
        </div>
      </div>
    </div>
   

    
  </body>     
</html>
