<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        text-align: center;
        gap: 20px;
      }

      .cat {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        opacity: 0.8;
      }
      p {
        font-size: 16px;
        font-family: Arial, sans-serif;
        color: #7b7676;
        margin: 0;
      }
      button {
        background-color: rgb(10, 102, 194);
        color: white;
        border: none;
        height: 40px;
        width: 80px;
        font-weight: bold;
        font-size: 15px;
        border-radius: 20px;
        cursor: pointer;
        margin-left: 130px;
      }
    </style>
  </head>
  <body>
    <img src="cat.jpg" class="cat">
    <p>What's happening?</p>
    <button>Tweet</button>
  </body>
</html>
