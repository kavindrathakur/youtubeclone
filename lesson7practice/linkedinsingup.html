<!DOCTYPE html>
<html>
  <head>
    <style>
      .put{
        font-size: 20px;
        font-family: Arial, sans-serif;
        color: #333;
        margin-bottom:0px;

      }
    .box {
      width: 50%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .policy {
      font-size: 16px;
      color: #666;
      margin-top: 10px;}
    .agree-button {
      background-color: rgb(10, 102, 194);
      color: white;
      border: none;
      height: 40px;
      width: 240px;
      font-weight: bold;
      font-size: 15px;
      border-radius: 20px;
      cursor: pointer;
      margin-top: 20px;
    }
    .agree-button:hover {
      background-color: rgb(77, 163, 249);
    }
    </style>

     </head>
  
  </body>
  <p class="put">
    Email
  </p>
  <input type="email" class="box">
  <p class="policy">
    By signing up, you agree to the LinkedIn User Agreement, Privacy Policy, and Cookie Policy.
  </p>
  <button class="agree-button">
    Agree & Join
  </button>
 </body>
</html>
