<!DOCTYPE html>

<html>
  <head>
    <style>
      div {
        width: 300px;
        
        background-color: white(196, 199, 196);
        border-color: black;
        border-width: 2px;
        border-style: solid;

       
      }
      .paragraph{
        font-family: 'Roboto', sans-serif;
        font-size: 18px;
        font-weight: 500;
        margin-left: 20px;
      }
      button{
        font-family: 'Roboto', sans-serif;
        font-size: 16px;
        font-weight: 400;
        margin-left: 20px;
        margin-bottom: 5px;
        padding: 5px 10px;
      }
    </style>
  </head>
  <body>
    <div>
      <p class="paragraph">
        Are you satisfied with the result?

      </p>
      <button >Yes</button>
      <button >No</button>

    </div>
  </body>     
</html>
