<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        text-align: center;
}
      .search-button {
        margin-top: 20px;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        background-color: rgb(234, 241, 234);
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        cursor: pointer;
      }
      div {
        width: 400px;
        height: fit-content;
        background-color: rgb(250, 250, 250);
        padding: 20px;
        text-align: center;
        margin:0 auto;
       margin-top: 200px;
       display: inline-block;
       
      }
      .google-logo {
        width: 160px;
        height: auto;
       
        margin: 50px auto 20px auto;
       
      }
      .search-box {
        border: none;
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.5);
        height: 30px;
        width: 380px;
        border-radius: 17px;
       
        margin: 0 auto;
      }
    </style>
   
  </head>
  <body>
    <div> 
      <img class="google-logo" src="googlelogo.png">
    <input class="search-box" type="text" placeholder="Search...">
    <button class="search-button">
      google search
    </button>
    <button class="search-button">
      I'm feeling lucky
    </button>
  </div>
   
  </body> 
</html>
